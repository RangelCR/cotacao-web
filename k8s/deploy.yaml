apiVersion: apps/v1
kind: Deployment
metadata:
  name: cotacao
  namespace: cotacao-web
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  replicas: 1
  selector:
    matchLabels:
      app: cotacao
  template:
    metadata:
      labels:
        app: cotacao
    spec:
      containers:
        - name: cotacao-web
          image: rangelcr/web_cotacao:latest
          ports:
            - containerPort: 8080
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "32Mi"   
              cpu: "50m"      
            limits:
              memory: "128Mi"  
              cpu: "200m" 
      restartPolicy: Always

 

